<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Özel Sohbet Sistemi</title>
<style>
       body {
           background-color: #0d1117;
           color: #c9d1d9;
           font-family: monospace;
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           margin: 0;
       }
       .box {
           background: #161b22;
           padding: 30px;
           border-radius: 8px;
           border: 1px solid #30363d;
           text-align: center;
           box-shadow: 0 4px 15px rgba(0,0,0,0.5);
           width: 320px;
       }
       input, textarea {
           width: 100%;
           padding: 10px;
           margin: 10px 0;
           background: #0d1117;
           border: 1px solid #30363d;
           color: #fff;
           border-radius: 4px;
           box-sizing: border-box;
       }
       button {
           width: 100%;
           padding: 10px;
           background: #238636;
           color: white;
           border: none;
           border-radius: 4px;
           cursor: pointer;
           font-weight: bold;
       }
       button:hover {
           background: #2ea043;
       }
       .error {
           color: #f85149;
           font-size: 12px;
           margin-top: 5px;
       }
       .hidden {
           display: none;
       }
       .chat-area {
           text-align: left;
           height: 150px;
           background: #0d1117;
           border: 1px solid #30363d;
           border-radius: 4px;
           padding: 10px;
           overflow-y: auto;
           margin-bottom: 10px;
           font-size: 13px;
       }
</style>
</head>
<body>
<!-- GİRİŞ EKRANI -->
<div id="loginSection" class="box">
<h2>🔒 Güvenli Alan</h2>
<p style="font-size: 13px; color: #8b949e;">Devam etmek için giriş yapın</p>
<input type="text" id="username" placeholder="Kullanıcı Adı">
<input type="password" id="password" placeholder="Şifre">
<button onclick="checkLogin()">Giriş Yap</button>
<div id="errorMsg" class="error"></div>
</div>
<!-- ŞİFRE DOĞRUYSA AÇILACAK SOHBET EKRANI -->
<div id="chatSection" class="box hidden" style="width: 380px;">
<h2 style="color: #58a6ff; font-size: 18px; margin-top: 0;">💬 Sohbet Odası</h2>
<div id="chatMessages" class="chat-area">
<div><b>Sistem:</b> Sohbet odasına hoş geldin!</div>
</div>
<input type="text" id="chatInput" placeholder="Mesajınızı yazın...">
<button onclick="sendMessage()">Gönder</button>
<button onclick="logout()" style="background: #da3633; margin-top: 10px;">Çıkış Yap</button>
</div>
<script>
       function checkLogin() {
           var user = document.getElementById("username").value;
           var pass = document.getElementById("password").value;
           // Kullanıcı adı: admin, Şifre: 1234
           if (user === "admin" && pass === "1234") {
               document.getElementById("loginSection").classList.add("hidden");
               document.getElementById("chatSection").classList.remove("hidden");
           } else {
               document.getElementById("errorMsg").innerText = "Hatalı kullanıcı adı veya şifre!";
           }
       }
       function sendMessage() {
           var input = document.getElementById("chatInput");
           var messages = document.getElementById("chatMessages");
           if (input.value.trim() !== "") {
               messages.innerHTML += "<div><b>Sen:</b> " + input.value + "</div>";
               input.value = "";
               messages.scrollTop = messages.scrollHeight;
           }
       }
       function logout() {
           document.getElementById("username").value = "";
           document.getElementById("password").value = "";
           document.getElementById("errorMsg").innerText = "";
           document.getElementById("chatSection").classList.add("hidden");
           document.getElementById("loginSection").classList.remove("hidden");
       }
</script>
</body>
</html>
