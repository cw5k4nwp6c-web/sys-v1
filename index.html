<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Lounge</title>
<style>
       * {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       }
       body {
           background-color: #0f111a;
           color: #e2e8f0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
       }
       .container {
           width: 100%;
           max-width: 420px;
           height: 100%;
           max-height: 750px;
           background: #1a1c29;
           border-radius: 16px;
           box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
           display: flex;
           flex-direction: column;
           overflow: hidden;
           border: 1px solid #2d3148;
       }
       /* Giriş Ekranı */
       #loginSection {
           padding: 40px 24px;
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           height: 100%;
           text-align: center;
       }
       .casino-logo {
           font-size: 32px;
           font-weight: 700;
           color: #d4af37;
           margin-bottom: 8px;
           letter-spacing: 2px;
       }
       .casino-subtitle {
           font-size: 14px;
           color: #94a3b8;
           margin-bottom: 32px;
       }
       .input-group {
           width: 100%;
           margin-bottom: 16px;
       }
       input {
           width: 100%;
           padding: 14px 16px;
           background: #0f111a;
           border: 1px solid #2d3148;
           border-radius: 8px;
           color: #fff;
           font-size: 16px;
           outline: none;
           transition: border-color 0.2s;
       }
       input:focus {
           border-color: #d4af37;
       }
       .btn {
           width: 100%;
           padding: 14px;
           background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
           border: none;
           border-radius: 8px;
           color: #0f111a;
           font-size: 16px;
           font-weight: 700;
           cursor: pointer;
           transition: opacity 0.2s;
       }
       .btn:hover {
           opacity: 0.9;
       }
       .error {
           color: #ef4444;
           font-size: 13px;
           margin-top: 12px;
       }
       /* Chat Ekranı */
       #chatSection {
           display: none;
           flex-direction: column;
           height: 100%;
       }
       .chat-header {
           padding: 16px 20px;
           background: #141622;
           border-bottom: 1px solid #2d3148;
           display: flex;
           justify-content: space-between;
           align-items: center;
       }
       .chat-title {
           font-size: 16px;
           font-weight: 600;
           color: #d4af37;
       }
       .header-buttons {
           display: flex;
           gap: 8px;
           align-items: center;
       }
       .clear-btn {
           background: transparent;
           border: 1px solid #ef4444;
           color: #ef4444;
           padding: 6px 10px;
           border-radius: 6px;
           font-size: 12px;
           cursor: pointer;
           transition: background 0.2s, color 0.2s;
           width: auto;
       }
       .clear-btn:hover {
           background: #ef4444;
           color: #fff;
       }
       .logout-btn {
           background: transparent;
           border: 1px solid #ef4444;
           color: #ef4444;
           padding: 6px 12px;
           border-radius: 6px;
           font-size: 12px;
           cursor: pointer;
           transition: background 0.2s, color 0.2s;
           width: auto;
       }
       .logout-btn:hover {
           background: #ef4444;
           color: #fff;
       }
       .chat-messages {
           flex: 1;
           padding: 20px;
           overflow-y: auto;
           display: flex;
           flex-direction: column;
           gap: 12px;
       }
       .message {
           max-width: 75%;
           padding: 10px 14px;
           border-radius: 12px;
           font-size: 14px;
           line-height: 1.4;
           word-wrap: break-word;
       }
       .message.user {
           background: #d4af37;
           color: #0f111a;
           align-self: flex-end;
           border-bottom-right-radius: 2px;
       }
       .message.other {
           background: #2d3148;
           color: #e2e8f0;
           align-self: flex-start;
           border-bottom-left-radius: 2px;
       }
       .chat-input-area {
           padding: 16px 20px;
           background: #141622;
           border-top: 1px solid #2d3148;
           display: flex;
           gap: 10px;
       }
       .chat-input-area input {
           flex: 1;
       }
       .send-btn {
           padding: 0 20px;
           background: #d4af37;
           border: none;
           border-radius: 8px;
           color: #0f111a;
           font-weight: 600;
           cursor: pointer;
           width: auto;
       }
       .hidden {
           display: none !important;
       }
</style>
</head>
<body>
<div class="container">
<!-- GİRİŞ EKRANI -->
<div id="loginSection">
<div class="casino-logo">VIP CASINO</div>
<div class="casino-subtitle">Özel Masa Girişi</div>
<div class="input-group">
<input type="text" id="username" placeholder="Kullanıcı Adı (sys-v1 veya sys-v2)" style="margin-bottom: 12px;" onkeydown="if(event.key==='Enter') checkLogin()">
<input type="password" id="password" placeholder="VIP Kodu / Şifre" onkeydown="if(event.key==='Enter') checkLogin()">
</div>
<button class="btn" onclick="checkLogin()">GİRİŞ YAP</button>
<div id="errorMsg" class="error"></div>
</div>
<!-- SOHBET EKRANI -->
<div id="chatSection" style="display: none;">
<div class="chat-header">
<div class="chat-title">VIP Masa #7</div>
<div class="header-buttons">
<button class="clear-btn" onclick="clearChat()">Sohbeti Sil</button>
<button class="logout-btn" onclick="logout()">Çıkış</button>
</div>
</div>
<div id="chatMessages" class="chat-messages">
<div class="message other"><b>Sistem:</b> Bağlantı kuruluyor...</div>
</div>
<div class="chat-input-area">
<input type="text" id="chatInput" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter') sendMessage()">
<button class="send-btn" onclick="sendMessage()">Gönder</button>
</div>
</div>
</div>
<!-- FIREBASE BAĞLANTISI VE MANTIK -->
<script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
       import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
       const firebaseConfig = {
           apiKey: "AIzaSyD2Q7JlHgD4guwrSPDMRIqatwIBLP7s3cI",
           authDomain: "sys-v1.firebaseapp.com",
           projectId: "sys-v1",
           storageBucket: "sys-v1.firebasestorage.app",
           messagingSenderId: "387697999264",
           appId: "1:387697999264:web:8eefcb28d64a2b7c5478c5"
       };
       const app = initializeApp(firebaseConfig);
       const db = getFirestore(app);
       let activeUser = "";
       window.checkLogin = function() {
           var user = document.getElementById("username").value.trim().toLowerCase();
           var pass = document.getElementById("password").value.trim();
           if ((user === "sys-v1" || user === "sys-v2") && pass === "1asdfg22") {
               activeUser = user;
               document.getElementById("loginSection").style.display = "none";
               document.getElementById("chatSection").style.display = "flex";
               loadMessages();
           } else {
               document.getElementById("errorMsg").innerText = "Hatalı Kullanıcı Adı veya VIP Kodu!";
           }
       }
       window.sendMessage = async function() {
           var input = document.getElementById("chatInput");
           if (input.value.trim() !== "") {
               try {
                   await addDoc(collection(db, "messages"), {
                       user: activeUser,
                       text: input.value,
                       time: serverTimestamp()
                   });
                   input.value = "";
               } catch (e) {
                   console.error("Mesaj gönderilemedi: ", e);
               }
           }
       }
       function loadMessages() {
           const q = query(collection(db, "messages"), orderBy("time", "asc"));
           onSnapshot(q, (snapshot) => {
               let messagesDiv = document.getElementById("chatMessages");
               messagesDiv.innerHTML = "";
               snapshot.forEach((docItem) => {
                   let data = docItem.data();
                   let msgDiv = document.createElement('div');
                   msgDiv.className = 'message ' + (data.user === activeUser ? 'user' : 'other');
                   msgDiv.textContent = data.text;
                   messagesDiv.appendChild(msgDiv);
               });
               messagesDiv.scrollTop = messagesDiv.scrollHeight;
           });
       }
       window.clearChat = async function() {
           if (confirm("Sohbet geçmişini kalıcı olarak silmek istediğine emin misin?")) {
               try {
                   const querySnapshot = await getDocs(collection(db, "messages"));
                   let deletePromises = [];
                   querySnapshot.forEach((documentSnapshot) => {
                       deletePromises.push(deleteDoc(doc(db, "messages", documentSnapshot.id)));
                   });
                   await Promise.all(deletePromises);
               } catch (e) {
                   console.error("Sohbet silinemedi: ", e);
               }
           }
       }
       window.logout = function() {
           document.getElementById("username").value = "";
           document.getElementById("password").value = "";
           document.getElementById("errorMsg").innerText = "";
           document.getElementById("chatSection").style.display = "none";
           document.getElementById("loginSection").style.display = "flex";
       }
</script>
</body>
</html>
