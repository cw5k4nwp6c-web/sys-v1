<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Lounge</title>
<style>
       * {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       }
       body {
           background-color: #0f111a;
           color: #e2e8f0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
       }
       .container {
           width: 100%;
           max-width: 420px;
           height: 100%;
           max-height: 750px;
           background: #1a1c29;
           border-radius: 16px;
           box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
           display: flex;
           flex-direction: column;
           overflow: hidden;
           border: 1px solid #2d3148;
       }
       /* Giriş Ekranı */
       #login-screen {
           padding: 40px 24px;
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           height: 100%;
           text-align: center;
       }
       .casino-logo {
           font-size: 32px;
           font-weight: 700;
           color: #d4af37;
           margin-bottom: 8px;
           letter-spacing: 2px;
       }
       .casino-subtitle {
           font-size: 14px;
           color: #94a3b8;
           margin-bottom: 32px;
       }
       .input-group {
           width: 100%;
           margin-bottom: 16px;
       }
       input {
           width: 100%;
           padding: 14px 16px;
           background: #0f111a;
           border: 1px solid #2d3148;
           border-radius: 8px;
           color: #fff;
           font-size: 16px;
           outline: none;
           transition: border-color 0.2s;
       }
       input:focus {
           border-color: #d4af37;
       }
       .btn {
           width: 100%;
           padding: 14px;
           background: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
           border: none;
           border-radius: 8px;
           color: #0f111a;
           font-size: 16px;
           font-weight: 700;
           cursor: pointer;
           transition: opacity 0.2s;
       }
       .btn:hover {
           opacity: 0.9;
       }
       /* Chat Ekranı */
       #chat-screen {
           display: none;
           flex-direction: column;
           height: 100%;
       }
       .chat-header {
           padding: 16px 20px;
           background: #141622;
           border-bottom: 1px solid #2d3148;
           display: flex;
           justify-content: space-between;
           align-items: center;
       }
       .chat-title {
           font-size: 16px;
           font-weight: 600;
           color: #d4af37;
       }
       .clear-btn {
           background: transparent;
           border: 1px solid #ef4444;
           color: #ef4444;
           padding: 6px 12px;
           border-radius: 6px;
           font-size: 12px;
           cursor: pointer;
           transition: background 0.2s, color 0.2s;
       }
       .clear-btn:hover {
           background: #ef4444;
           color: #fff;
       }
       .chat-messages {
           flex: 1;
           padding: 20px;
           overflow-y: auto;
           display: flex;
           flex-direction: column;
           gap: 12px;
       }
       .message {
           max-width: 75%;
           padding: 10px 14px;
           border-radius: 12px;
           font-size: 14px;
           line-height: 1.4;
           word-wrap: break-word;
       }
       .message.user {
           background: #d4af37;
           color: #0f111a;
           align-self: flex-end;
           border-bottom-right-radius: 2px;
       }
       .message.other {
           background: #2d3148;
           color: #e2e8f0;
           align-self: flex-start;
           border-bottom-left-radius: 2px;
       }
       .chat-input-area {
           padding: 16px 20px;
           background: #141622;
           border-top: 1px solid #2d3148;
           display: flex;
           gap: 10px;
       }
       .chat-input-area input {
           flex: 1;
       }
       .send-btn {
           padding: 0 20px;
           background: #d4af37;
           border: none;
           border-radius: 8px;
           color: #0f111a;
           font-weight: 600;
           cursor: pointer;
       }
</style>
</head>
<body>
<div class="container">
<!-- Giriş Ekranı (Casino Temalı) -->
<div id="login-screen">
<div class="casino-logo">VIP CASINO</div>
<div class="casino-subtitle">Özel Masa Girişi</div>
<div class="input-group">
<input type="password" id="access-code" placeholder="VIP Kodunu Girin">
</div>
<button class="btn" onclick="enterLounge()">GİRİŞ YAP</button>
</div>
<!-- Chat Ekranı -->
<div id="chat-screen">
<div class="chat-header">
<div class="chat-title">VIP Masa #7</div>
<button class="clear-btn" onclick="clearChat()">Temizle</button>
</div>
<div class="chat-messages" id="message-container">
<!-- Mesajlar buraya gelecek -->
</div>
<div class="chat-input-area">
<input type="text" id="message-input" placeholder="Mesaj yaz..." onkeypress="checkEnter(event)">
<button class="send-btn" onclick="sendMessage()">Gönder</button>
</div>
</div>
</div>
<script>
       function enterLounge() {
           const code = document.getElementById('access-code').value;
           // İstediğin şifreyi buraya yazabilirsin (Örn: "1421" veya özel bir kelime)
           if (code.trim() !== "") {
               document.getElementById('login-screen').style.display = 'none';
               document.getElementById('chat-screen').style.display = 'flex';
               loadMessages();
           } else {
               alert("Lütfen geçerli bir kod girin.");
           }
       }
       function loadMessages() {
           const container = document.getElementById('message-container');
           const saved = localStorage.getItem('vip_chat_messages');
           if (saved) {
               container.innerHTML = saved;
           }
           container.scrollTop = container.scrollHeight;
       }
       function sendMessage() {
           const input = document.getElementById('message-input');
           const text = input.value.trim();
           if (!text) return;
           const container = document.getElementById('message-container');
           const msgDiv = document.createElement('div');
           msgDiv.className = 'message user';
           msgDiv.textContent = text;
           container.appendChild(msgDiv);
           input.value = '';
           container.scrollTop = container.scrollHeight;
           localStorage.setItem('vip_chat_messages', container.innerHTML);
       }
       function checkEnter(e) {
           if (e.key === 'Enter') {
               sendMessage();
           }
       }
       function clearChat() {
           if (confirm("Sohbeti temizlemek istediğine emin misin?")) {
               localStorage.removeItem('vip_chat_messages');
               document.getElementById('message-container').innerHTML = '';
           }
       }
</script>
</body>
</html>
